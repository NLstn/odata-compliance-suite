name: Release

on:
  push:
    tags:
      # Full version tags only (vX.Y.Z). The moving major tag (v1) used for the
      # Action ref must NOT trigger a release — it points at an already-released
      # commit and would fail re-uploading existing assets.
      - 'v*.*.*'

permissions:
  contents: write   # create the GitHub Release + upload binaries
  packages: write   # push the Docker image to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # GoReleaser needs full history + tags

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
